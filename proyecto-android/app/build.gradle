plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
}

android {
    namespace "com.sena.actividadandroidstudio"
    compileSdk {
        version = release(36) {
            it.minorApiLevel = 1
        }
    }

    defaultConfig {
        applicationId "com.sena.actividadandroidstudio"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:34.7.0")
    implementation "com.google.firebase:firebase-analytics"
}
